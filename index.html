<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dipheko Motors</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Barlow', sans-serif; background: #0b0b0b; color: #f2f0ed; overflow: hidden; }
    a { text-decoration: none; color: inherit; }
    ul { list-style: none; }

    nav {
      position: fixed; top: 0; left: 0; right: 0;
      height: 70px; z-index: 100;
      display: flex; align-items: center;
      padding: 0 5%;
      background: rgba(11,11,11,0.96);
      border-bottom: 1px solid rgba(192,0,26,0.25);
    }
    .logo-main {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.8rem; font-weight: 800; letter-spacing: 4px; color: #f2f0ed;
    }
    .logo-sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.9rem; font-weight: 700; letter-spacing: 5px; color: #c0001a; margin-left: 8px;
    }
    .nav-links {
      display: flex; align-items: center; gap: 2.5rem;
      margin-left: 4rem;
    }
    .nav-links a {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: #888;
      padding-bottom: 4px; position: relative; transition: color 0.2s;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 2px; background: #c0001a; transform: scaleX(0); transition: transform 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: #f2f0ed; }
    .nav-links a:hover::after, .nav-links a.active::after { transform: scaleX(1); }

    main {
      padding-top: 70px; height: 100vh;
      position: relative; overflow: hidden;
      display: flex; flex-direction: column;
      background: radial-gradient(ellipse 70% 60% at 65% 50%, rgba(192,0,26,0.08) 0%, transparent 70%), #0b0b0b;
    }
    .bg-logo {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-family: 'Barlow Condensed', sans-serif; font-weight: 800;
      font-size: clamp(8rem, 20vw, 20rem); letter-spacing: 0.05em;
      color: transparent; -webkit-text-stroke: 1px rgba(255,255,255,0.05);
      white-space: nowrap; pointer-events: none; user-select: none; z-index: 0;
    }
    .hero {
      flex: 1; display: flex; align-items: center;
      padding: 0 8%; position: relative; z-index: 1;
    }
    .hero-inner { animation: fadeUp 0.8s ease both; }
    .hero-tag {
      font-size: 0.75rem; font-weight: 600; letter-spacing: 4px;
      text-transform: uppercase; color: #c0001a; margin-bottom: 18px;
    }
    h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(4rem, 9vw, 8rem); font-weight: 800;
      line-height: 0.92; color: #f2f0ed; margin-bottom: 22px;
    }
    h1 span { color: #c0001a; }
    .hero-desc {
      font-size: 1rem; font-weight: 300; color: #888;
      margin-bottom: 36px; max-width: 360px; line-height: 1.7;
    }
    .hero-btn {
      display: inline-block; background: #c0001a; color: #f2f0ed;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; padding: 14px 36px; border-radius: 6px;
      transition: opacity 0.2s, transform 0.2s;
    }
    .hero-btn:hover { opacity: 0.85; transform: translateY(-2px); }
    .bottom-bar {
      position: relative; z-index: 1;
      display: flex; align-items: center; gap: 32px;
      padding: 20px 8%; border-top: 1px solid rgba(255,255,255,0.06);
      animation: fadeUp 0.8s 0.2s ease both;
    }
    .stat { display: flex; flex-direction: column; }
    .stat-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.6rem; font-weight: 700; color: #c0001a; line-height: 1;
    }
    .stat-label {
      font-size: 0.68rem; letter-spacing: 2px;
      text-transform: uppercase; color: #888; margin-top: 3px;
    }
    .divider { width: 1px; height: 36px; background: rgba(255,255,255,0.08); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <nav>
    <span class="logo-main">DIPHEKO</span>
    <span class="logo-sub">MOTORS</span>
    <ul class="nav-links">
      <li><a href="index.html" class="active">Home</a></li>
      <li><a href="inventory.html">Inventory</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="cardetails.html">Car Details</a></li>
      <li><a href="shop.html">Shop Now</a></li>
    </ul>
  </nav>

  <main>
    <div class="bg-logo" aria-hidden="true">DIPHEKO</div>
    <div class="hero">
      <div class="hero-inner">
        <p class="hero-tag">Est. 2024 &middot; Botswana</p>
        <h1>Find Your<br/><span>Next Drive.</span></h1>
        <p class="hero-desc">Quality vehicles. Honest deals. Built for the road ahead.</p>
        <a href="inventory.html" class="hero-btn">Browse Inventory</a>
      </div>
    </div>
   
  </main>

</body>
</html>
