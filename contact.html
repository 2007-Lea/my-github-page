<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dipheko Motors – Contact</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; font-family: 'Barlow', sans-serif; background: #0b0b0b; color: #f2f0ed; }
    a { text-decoration: none; color: inherit; }
    ul { list-style: none; }

    nav {
      position: fixed; top: 0; left: 0; right: 0; height: 70px; z-index: 100;
      display: flex; align-items: center; padding: 0 5%;
      background: rgba(11,11,11,0.96); border-bottom: 1px solid rgba(192,0,26,0.25);
    }
    .logo-main { font-family: 'Barlow Condensed', sans-serif; font-size: 1.8rem; font-weight: 800; letter-spacing: 4px; color: #f2f0ed; }
    .logo-sub  { font-family: 'Barlow Condensed', sans-serif; font-size: 0.9rem; font-weight: 700; letter-spacing: 5px; color: #c0001a; margin-left: 8px; }
    .nav-links { display: flex; align-items: center; gap: 2.5rem; margin-left: 4rem; }
    .nav-links a { font-family: 'Barlow Condensed', sans-serif; font-size: 1rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #888; padding-bottom: 4px; position: relative; transition: color 0.2s; }
    .nav-links a::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: #c0001a; transform: scaleX(0); transition: transform 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: #f2f0ed; }
    .nav-links a:hover::after, .nav-links a.active::after { transform: scaleX(1); }

    .page {
      padding-top: 70px; min-height: 100vh; position: relative;
      background: radial-gradient(ellipse 70% 60% at 65% 50%, rgba(192,0,26,0.07) 0%, transparent 70%), #0b0b0b;
    }
    .bg-logo {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-family: 'Barlow Condensed', sans-serif; font-weight: 800;
      font-size: clamp(8rem, 20vw, 20rem); letter-spacing: 0.05em;
      color: transparent; -webkit-text-stroke: 1px rgba(255,255,255,0.04);
      white-space: nowrap; pointer-events: none; user-select: none; z-index: 0;
    }

    .content { position: relative; z-index: 1; padding: 60px 6%; }
    .page-tag { font-size: 0.75rem; font-weight: 600; letter-spacing: 4px; text-transform: uppercase; color: #c0001a; margin-bottom: 10px; animation: fadeUp 0.7s ease both; }
    .page-title { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(2.5rem, 6vw, 5rem); font-weight: 800; line-height: 1; margin-bottom: 48px; animation: fadeUp 0.7s ease both; }

    .contact-layout { display: grid; grid-template-columns: 1fr 1.4fr; gap: 40px; animation: fadeUp 0.7s 0.1s ease both; }

    .contact-info { display: flex; flex-direction: column; gap: 20px; }
    .info-card {
      background: #141414; border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px; padding: 24px;
      display: flex; align-items: flex-start; gap: 16px;
      transition: border-color 0.25s;
    }
    .info-card:hover { border-color: rgba(192,0,26,0.4); }
    .info-icon { font-size: 1.5rem; margin-top: 2px; }
    .info-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #c0001a; margin-bottom: 6px; }
    .info-value { font-size: 0.95rem; color: #ccc; line-height: 1.6; }

    .contact-form {
      background: #141414; border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px; padding: 32px;
    }
    .contact-form h3 { font-family: 'Barlow Condensed', sans-serif; font-size: 1.4rem; font-weight: 800; margin-bottom: 24px; }

    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 0.75rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: #888; margin-bottom: 8px; }
    .form-group input,
    .form-group textarea {
      width: 100%; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 6px;
      padding: 12px 16px; color: #f2f0ed; font-family: 'Barlow', sans-serif; font-size: 0.95rem;
      transition: border-color 0.2s; outline: none;
    }
    .form-group input:focus,
    .form-group textarea:focus { border-color: #c0001a; }
    .form-group textarea { resize: vertical; min-height: 110px; }

    .form-btn {
      display: inline-block; background: #c0001a; color: #f2f0ed;
      font-family: 'Barlow Condensed', sans-serif; font-size: 1rem; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      padding: 14px 36px; border-radius: 6px; border: none; cursor: pointer;
      transition: opacity 0.2s, transform 0.2s; width: 100%;
    }
    .form-btn:hover { opacity: 0.85; transform: translateY(-1px); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 700px) { .contact-layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <nav>
    <span class="logo-main">DIPHEKO</span>

    <ul class="nav-links">

      <li><a href="shop.html">Shop Now</a></li>
    </ul>
  </nav>

  <div class="page">
    <div class="bg-logo" aria-hidden="true">DIPHEKO</div>
    <div class="content">

      <div class="contact-layout">

        <div class="contact-info">
          <div class="info-card">
            <div>
              <div class="info-label">Phone</div>

            </div>
          </div>
          <div class="info-card">
              <div class="info-label">Email</div>
              <div class="info-value">bida25-079@thuto.bac.ac.bw</div>

            </div>
          </div>
        </div>
